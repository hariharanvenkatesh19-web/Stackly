// 21) Small E-Commerce Logic.

  class ECommerceApp {
  constructor() {
    this.products = [];
    this.cart = [];
  }

  async fetchProducts() {
    try {
      const response = await fetch('https://fakestoreapi.com/products');
      this.products = await response.json();
      console.log('Products fetched:', this.products.length);
    } catch (error) {
      console.error('Error fetching products:', error);
    }
  }

  filterByCategory(category) {
    return this.products.filter(product => 
      product.category.toLowerCase() === category.toLowerCase()
    );
  }

  sortByPrice(ascending = true) {
    const sorted = [...this.products];
    return sorted.sort((a, b) => 
      ascending ? a.price - b.price : b.price - a.price
    );
  }

  searchProduct(searchTerm) {
    return this.products.filter(product => 
      product.title.toLowerCase().includes(searchTerm.toLowerCase())
    );
  }

  addToCart(productId, qty = 1) {
    const product = this.products.find(p => p.id === productId);
    
    if (!product) {
      console.log('Product not found');
      return;
    }

    const existingItem = this.cart.find(item => item.id === productId);
    
    if (existingItem) {
      existingItem.qty += qty;
    } else {
      this.cart.push({
        id: product.id,
        title: product.title,
        price: product.price,
        qty: qty
      });
    }
    
    console.log(`Added ${qty} x ${product.title} to cart`);
  }

  calculateTotal() {
    return this.cart.reduce((sum, item) => {
      return sum + (item.price * item.qty);
    }, 0);
  }

  displayCart() {
    console.log('=== Shopping Cart ===');
    this.cart.forEach(item => {
      console.log(`${item.title} x ${item.qty} = $${item.price * item.qty}`);
    });
    console.log(`Total: $${this.calculateTotal()}`);
  }
}
async function runECommerce() {
  const app = new ECommerceApp();

  app.addToCart(1, 2);
  app.addToCart(2, 1);
  app.addToCart(3, 3);
  app.displayCart();
  
  console.log('Total:', app.calculateTotal());
}
