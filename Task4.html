// 2) Mobile Password Strength Checker.

function checkPassword(password) {
  let Length = password.length >= 8;
  let Number = false;
  let Uppercase = false;

  for (let i = 0; i < password.length; i++) {
    let ch = password[i];

    if (ch >= "0" && ch <= "9") {
      Number = true;
    }

    if (ch >= "A" && ch <= "Z") {
      Uppercase = true;
    }
  }

  if (Length && Number && Uppercase) {
    console.log("Strong Password");
  } else {
    console.log("Weak Password");
  }
}

checkPassword("Abc12345");

//  3) Find Second Largest Number. 

function secondLargest(ary) {
  let largest = ary[0];
  let second = ary[0];

for (let i = 1; i < ary.length; i++) {
  if (ary[i] > largest) {
      second = largest;
      largest = ary[i];
    } else if (ary[i] > second && ary[i] < largest) {
      second = ary[i];
    }
  }

  console.log(second);
}

secondLargest([10, 50, 80, 20, 90, 70]);

// 4) Bus Seat Booking System.

let seats = [false, false, false, false, false, false, false, false, false, false];

function bookSeat(seatNumber) {
  let seat = seatNumber - 1;

  if (seats[seat] === true) {
    console.log("Seat Already Booked");
  } else {
    seats[seat] = true;
    console.log("Seat Booked Successfully");

}

function withdraw(balance, amount) {
  if (amount <= balance - 1000) {
    balance = balance - amount;
    console.log("Withdraw Successful");

  } else {

  }
}

// 9) Reverse Word Without reverse().

function reverseWord(word) {
  let result = "";

  for (let i = word.length - 1; i >= 0; i--) {
    result = result + word[i];
  }

  console.log(result);
}

reverseWord("HariHaran");
