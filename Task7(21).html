<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 21 - E-Commerce App</title>
  <link rel="stylesheet" href="Task7(21).css">
</head>
<body>
  <div class="container">
    <h1>E-Commerce Store</h1>
    
    <div class="ecommerce-controls">
      <div class="control-group">
        <input type="text" id="searchInput" placeholder="Search products...">
        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option value="electronics">Electronics</option>
          <option value="jewelery">Jewelery</option>
          <option value="mens clothing">Men's Clothing</option>
          <option value="womens clothing">Women's Clothing</option>
        </select>
        <select id="sortOrder">
          <option value="asc">Price: Low to High</option>
          <option value="desc">Price: High to Low</option>
        </select>
        <button id="searchBtn">Search</button>
        <button id="resetBtn">Reset</button>
      </div>
      <div class="filter-tags" id="filterTags"></div>
    </div>
    
    <div class="product-count" id="productCount"></div>

    <div class="loading" id="loading">Loading products</div>
    
    <div class="error" id="error"></div>
    
    <div id="product-container"></div>
    
    <div class="cart-section">
      <h2>Shopping Cart</h2>
      <div class="cart-items" id="cartItems">
        <div class="empty-cart">Your cart is empty</div>
      </div>
      
      <div class="cart-summary" id="cartSummary" style="display: none;">
        <div class="summary-row">
          <span>Subtotal:</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax (10%):</span>
          <span id="tax">$0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total:</span>
          <span id="total">$0.00</span>
        </div>
        <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
      </div>
    </div>
  </div>
  
  <script src="Task7(21).js"></script>
</body>
</html>
